<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUSHAL V7 MOD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            border: 2px solid #00ff00; /* V6 Style Side Border */
        }

        /* Main Panel Box */
        .panel-box {
            width: 350px;
            background: #000;
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px #00ff00;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #080808;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-size: 14px;
            outline: none;
            border-radius: 5px;
        }

        input::placeholder {
            color: rgba(0, 255, 0, 0.4);
        }

        /* Feature Switches (V6 Special) */
        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
        }

        .feature-item span {
            font-size: 14px;
            font-weight: bold;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222;
            transition: .4s;
            border-radius: 20px;
            border: 1px solid #00ff00;
        }

        input:checked + .slider {
            background-color: #00ff00;
        }

        /* Login Button */
        .btn-main {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-main:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        .footer-text {
            font-size: 10px;
            margin-top: 15px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="panel-box">
        <div class="header">KAUSHAL V7</div>
        
        <div class="input-group">
            <input type="text" placeholder="ENTER USERNAME...">
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="ENTER KEY...">
        </div>

        <div class="feature-item">
            <span>AIMBOT AUTO</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature-item">
            <span>ESP LINE</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature-item">
            <span>SPEED HACK</span>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-main" onclick="startV7()">INJECT V7 NOW</button>

        <div class="footer-text">MADE BY KAUSHAL DEVELOPER</div>
    </div>

    <script>
        function startV7() {
            alert("V7 Injecting... Success!");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Emoji Power</title>
    <style>
        :root { --bg: #36393f; --sidebar: #2f3136; --servers: #202225; --text: #dcddde; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg); color: white; overflow: hidden; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar Styles */
        .server-list { width: 72px; background-color: var(--servers); padding: 12px 0; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .server-icon { width: 48px; height: 48px; background-color: var(--bg); border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .server-icon:hover { border-radius: 30%; background-color: #5865f2; }
        
        .channels { width: 240px; background-color: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; }
        .channel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .channel-list { flex-grow: 1; padding: 10px; }
        .channel-item { padding: 8px; color: #8e9297; cursor: pointer; border-radius: 4px; }
        .channel-item.active { background-color: #393c43; color: white; }

        .user-profile { background-color: #232428; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; background-color: #5865f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Chat & Input */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        .messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .input-wrapper { padding: 20px; display: flex; align-items: center; gap: 10px; position: relative; }
        .plus-btn, .emoji-btn { background: #b9bbbe; color: #36393f; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; flex-shrink: 0; }
        input { flex-grow: 1; padding: 12px; background-color: #40444b; border: none; border-radius: 8px; color: white; outline: none; }

        /* --- EMOJI MENU --- */
        .emoji-menu {
            position: absolute; bottom: 70px; right: 20px; background: #2f3136;
            border-radius: 8px; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr);
            gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100;
        }
        .emoji-item { cursor: pointer; font-size: 20px; padding: 5px; transition: 0.2s; }
        .emoji-item:hover { background: #393c43; border-radius: 4px; }

        .typing-indicator { font-size: 12px; color: #b9bbbe; padding: 0 20px 5px; display: none; }
        .uploaded-img { max-width: 250px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        <nav class="server-list"><div class="server-icon">D</div></nav>

        <aside class="channels">
            <header class="channel-header">KAUSHAL'S HUB</header>
            <div class="channel-list"><div class="channel-item active"># chat-room</div></div>
            <div class="user-profile">
                <div class="avatar">K</div>
                <div class="user-info"><strong>Kaushal</strong></div>
            </div>
        </aside>

        <main class="chat-area">
            <div class="messages" id="messageBox"></div>
            <div class="typing-indicator" id="typing">DevFriend is thinking...</div>
            
            <div class="emoji-menu" id="emojiMenu">
                <span class="emoji-item">😂</span><span class="emoji-item">🔥</span><span class="emoji-item">🙌</span><span class="emoji-item">💀</span><span class="emoji-item">🎮</span>
                <span class="emoji-item">❤️</span><span class="emoji-item">👻</span><span class="emoji-item">💻</span><span class="emoji-item">🚀</span><span class="emoji-item">👀</span>
            </div>

            <div class="input-wrapper">
                <label for="imgInput" class="plus-btn">+</label>
                <input type="file" id="imgInput" style="display:none;" accept="image/*">
                <input type="text" id="userInput" placeholder="Type a message...">
                <div class="emoji-btn" id="emojiBtn">😊</div>
            </div>
        </main>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <script>
        const input = document.getElementById('userInput');
        const messageBox = document.getElementById('messageBox');
        const emojiBtn = document.getElementById('emojiBtn');
        const emojiMenu = document.getElementById('emojiMenu');
        const notifSound = document.getElementById('notifSound');

        // Toggle Emoji Menu
        emojiBtn.onclick = () => emojiMenu.style.display = emojiMenu.style.display === 'grid' ? 'none' : 'grid';

        // Add Emoji to Input
        document.querySelectorAll('.emoji-item').forEach(el => {
            el.onclick = () => {
                input.value += el.innerText;
                emojiMenu.style.display = 'none';
                input.focus();
            };
        });

        input.onkeypress = (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const val = input.value;
                sendMessage("Kaushal", val, false);
                input.value = "";
                botReply(val);
            }
        };

        function sendMessage(name, content, isBot) {
            const div = document.createElement('div');
            div.innerHTML = `<strong>${isBot ? 'DevFriend' : name}:</strong> ${content}`;
            messageBox.appendChild(div);
            messageBox.scrollTop = messageBox.scrollHeight;
            if (isBot) notifSound.play();
        }

        function botReply(msg) {
            document.getElementById('typing').style.display = 'block';
            setTimeout(() => {
                document.getElementById('typing').style.display = 'none';
                let r = "Sahi hai! 😎";
                if(msg.match(/😂|🔥|❤️/)) r = "Hahaha! Mast emojis hain. ✨";
                if(msg.toLowerCase().includes("kaise ho")) r = "Main ekdum chill hoon, tum batao! 🚀";
                sendMessage("Bot", r, true);
            }, 1200);
        }

        document.getElementById('imgInput').onchange = function() {
            const reader = new FileReader();
            reader.onload = (e) => sendMessage("Kaushal", `<img src="${e.target.result}" class="uploaded-img">`, false);
            reader.readAsDataURL(this.files[0]);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAUSHAL V6 - ELITE PENAL</title>
    <style>
        body { background: #020202; color: #00ffcc; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel-container { width: 450px; background: rgba(5, 5, 5, 0.98); border: 1px solid #00ffcc; border-radius: 5px; padding: 25px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); position: relative; }
        
        /* SCANNING OVERLAY EFFECT */
        .panel-container::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 204, 0.5); animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        h1 { font-size: 18px; letter-spacing: 5px; text-transform: uppercase; color: #fff; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        .terminal-box { background: #000; border: 1px solid #1a1a1a; height: 180px; overflow-y: auto; text-align: left; font-size: 11px; padding: 10px; margin-bottom: 15px; color: #0f0; }
        .info-text { color: #00bfff; }
        .warn-text { color: #ff0055; font-weight: bold; }

        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 93%; padding: 12px; background: #0a0a0a; border: 1px solid #00ffcc; color: #00ffcc; border-radius: 3px; outline: none; font-family: 'Consolas', monospace; }
        
        .btn-inject { width: 100%; padding: 15px; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-inject:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        #progress-container { display: none; margin-bottom: 15px; }
        .bar-bg { width: 100%; background: #111; height: 6px; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .bar-fill { width: 0%; background: #ff0055; height: 100%; transition: 0.2s; box-shadow: 0 0 10px #ff0055; }

        /* FULLSCREEN BYPASS */
        #editor-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="login-screen" class="panel-container">
    <h1>V6 SYSTEM AUTH</h1>
    <input type="text" id="userKey" placeholder="ENTER ACCESS KEY">
    <button class="btn-inject" onclick="checkLogin()" style="margin-top:15px;">LOGIN</button>
</div>

<div id="main-panel" class="panel-container" style="display:none;">
    <h1>KAUSHAL V6 TERMINAL</h1>
    
    <div class="terminal-box" id="log">
        <div class="info-text">[LOG] System encrypted. Ready for breach...</div>
    </div>

    <div id="progress-container">
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <span id="status-label">INITIALIZING...</span>
            <span id="percent-label">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div class="input-group">
        <input type="text" id="target" placeholder="TARGET URL (e.g. google.com)">
    </div>
    <button class="btn-inject" id="runBtn" onclick="startBreach()">START SERVER BREACH</button>
</div>

<div id="editor-overlay">
    <div style="position:absolute; top:10px; right:20px; z-index:10000;">
        <button onclick="location.reload()" style="background:#ff0055; color:white; border:none; padding:10px 20px; cursor:pointer; font-family: monospace;">TERMINATE SESSION</button>
    </div>
    <iframe id="site-frame"></iframe>
</div>

<script>
    function addLog(msg, type = "") {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        if(type === "info") div.className = "info-text";
        if(type === "warn") div.className = "warn-text";
        div.innerHTML = "> " + msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function checkLogin() {
        if(document.getElementById('userKey').value.toUpperCase() === "V6") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
            addLog("ACCESS GRANTED: WELCOME KAUSHAL", "info");
        } else { alert("ACCESS DENIED"); }
    }

    async function startBreach() {
        let url = document.getElementById('target').value;
        if(!url) return alert("Target missing!");

        document.getElementById('runBtn').disabled = true;
        document.getElementById('progress-container').style.display = 'block';

        // 1. IP SCANNING PHASE
        addLog("Starting IP Trace...", "info");
        await new Promise(r => setTimeout(r, 1000));
        let fakeIP = `192.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        addLog(`SERVER IP FOUND: ${fakeIP}`, "warn");
        addLog("LOCATION: Singapore / Amazon Data Center", "info");

        // 2. PORT SCANNING
        addLog("Scanning Vulnerable Ports...", "info");
        const ports = [21, 22, 80, 443, 3306];
        for(let port of ports) {
            await new Promise(r => setTimeout(r, 400));
            addLog(`Port ${port}: OPEN`, "info");
        }

        // 3. DATABASE EXTRACTION
        const files = ["config.php", "users.db", "passwords.txt", "admin_panel.js"];
        for(let i=0; i < files.length; i++) {
            await new Promise(r => setTimeout(r, 700));
            addLog(`EXTRACTING: ${files[i]}... SUCCESS`, "warn");
            let p = ((i+1) / files.length) * 100;
            document.getElementById('bar-fill').style.width = p + "%";
            document.getElementById('percent-label').innerText = Math.floor(p) + "%";
            document.getElementById('status-label').innerText = "DOWNLOADING DATABASE...";
        }

        addLog("BYPASSING CLOUDFLARE FIREWALL...", "info");
        await new Promise(r => setTimeout(r, 1200));
        addLog("INJECTION COMPLETE. OPENING TUNNEL.", "warn");

        setTimeout(() => {
            if(!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('site-frame').src = url;
            document.getElementById('editor-overlay').style.display = 'block';
        }, 1000);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Gaming Dashboard</title>
    <style>
        body {
            background-color: #0b0b0d;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .panel {
            width: 350px;
            background: linear-gradient(145deg, #1a1a1d, #25252b);
            border: 2px solid #ff4655;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.3);
            text-align: center;
        }

        h2 {
            color: #ff4655;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #2d2d35;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }

        .stat-box:hover {
            background: #3a3a45;
            transform: scale(1.02);
        }

        .btn {
            background-color: #ff4655;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #ff2e3d;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>FF Stats Panel</h2>
        
        <div class="stat-box">
            <span>Win Rate</span>
            <span style="color: #00ff88;">68%</span>
        </div>
        
        <div class="stat-box">
            <span>Headshot Rate</span>
            <span style="color: #ffcc00;">42%</span>
        </div>

        <div class="stat-box">
            <span>Rank</span>
            <span style="color: #ff4655;">Heroic</span>
        </div>

        <button class="btn">Update Stats</button>
    </div>

</body>
</html>
